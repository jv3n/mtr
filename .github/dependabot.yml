# Automated dependency updates. See issue #18.
# The CI workflow (spotlessCheck + build) gates every PR opened here.
version: 2

updates:
  # --- JVM dependencies + Gradle plugin versions + the Gradle wrapper itself ---
  # Verified on the first run: the wrapper IS bumped (gradlew, gradlew.bat, the jar and
  # gradle-wrapper.properties), and the Ktor version behind `val ktor = "..."` is resolved.
  # Watch the wrapper PRs: regenerating gradlew.bat rewrites its line endings, and
  # .gitattributes (* text=auto eol=lf) must win -> see the "Fins de ligne" note in CLAUDE.md.
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 3
    # `build(deps): bump ...` — the commit-msg hook enforces Conventional Commits.
    commit-message:
      prefix: build
      include: scope
    groups:
      # One PR for everything low-risk; majors stay separate, they need a decision
      # (JDK 26, Ktor 4, Kotlin 3 ...).
      gradle-minor-patch:
        update-types:
          - minor
          - patch

  # --- Actions pinned in ci.yml / docker.yml ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns:
          - "*"

  # --- Base images: Dockerfile (build + runtime stages) and docker-compose.yml ---
  # A major eclipse-temurin bump also means jvmToolchain() and the CI java-version:
  # treat it as a migration, not a merge.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 3
    commit-message:
      prefix: build
      include: scope
    groups:
      docker-minor-patch:
        update-types:
          - minor
          - patch
